<div class="card wide-card" id="suggestionsSection">
    <!-- Header with Tabs -->
    <div class="suggestion-header">
        <button type="button" class="back-button" data-action="back-to-menu">← Back</button>
        <div class="suggestion-tabs">
            <button type="button" class="tab-btn" onclick="Suggestions.showList('forSaleen')">For You</button>
            <button type="button" class="tab-btn" onclick="Suggestions.showList('forUs')">For Us 💕</button>
            <button type="button" class="tab-btn" onclick="Suggestions.showList('forEmran')">For Me</button>
        </div>
    </div>

    <!-- Main Content Area to hold the lists -->
    <div class="suggestion-content">
        <div id="list-forSaleen" class="suggestions-list"></div>
        <div id="list-forEmran" class="suggestions-list hidden"></div>
        <div id="list-forUs" class="suggestions-list hidden"></div>
    </div>

    <!-- Footer with Input Area -->
    <div class="suggestion-footer">
        <div class="input-form">
            <div class="icon-selector">
                <button type="button" class="icon-btn" data-icon="movie" onclick="Suggestions.selectIcon('movie')" title="Movie">🎬</button>
                <button type="button" class="icon-btn" data-icon="music" onclick="Suggestions.selectIcon('music')" title="Music">🎵</button>
                <button type="button" class="icon-btn" data-icon="youtube" onclick="Suggestions.selectIcon('youtube')" title="YouTube">📺</button>
                <button type="button" class="icon-btn" data-icon="book" onclick="Suggestions.selectIcon('book')" title="Book">📚</button>
                <button type="button" class="icon-btn" data-icon="link" onclick="Suggestions.selectIcon('link')" title="Link">🔗</button>
            </div>
            <input type="text" id="suggestionInput" placeholder="Add a movie, song, link..." oninput="Suggestions.checkInputs()" onkeypress="Suggestions.handleEnter(event)" />
        </div>
        <button type="button" onclick="Suggestions.addSuggestion()" id="addSuggestionBtn" class="add-suggestion-btn" disabled>Add Suggestion</button>
    </div>
</div>
